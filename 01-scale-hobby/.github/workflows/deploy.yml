name: Deploy to EC2

on:
  push:
    branches: [main]
  pull_request:

permissions:
  id-token: write  # OIDC 토큰 발급
  contents: read

env:
  AWS_REGION: ap-northeast-2

jobs:
  # ── 1단계: Semgrep SAST ──────────────────────────────────────────
  semgrep:
    name: Semgrep SAST Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/secrets
            p/default
        env:  
            SEMGREP_RULES_EXCLUDE: python.flask.security.audit.app-run-param-config.avoid_app_run_with_bad_host

  # ── 2단계: 빌드 & S3 업로드 → SSM 배포 ─────────────────────────
  # main 브랜치 push 시에만 실행 (PR은 Semgrep만 실행)
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: semgrep
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # OIDC로 AWS 인증 (Access Key 없음)
      # AWS_DEPLOY_ROLE_ARN = terraform output github_actions_role_arn
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # 앱 소스를 zip으로 묶어 S3 builds/ 경로에 업로드
      # 커밋 SHA를 파일명에 포함해 버전 추적
      - name: Package & Upload to S3
        run: |
          zip -r app-${{ github.sha }}.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "*.md" \
            --exclude "terraform/*" \

          aws s3 cp app-${{ github.sha }}.zip \
            s3://${{ secrets.S3_BUCKET_NAME }}/builds/app-${{ github.sha }}.zip

          echo "S3 업로드 완료: builds/app-${{ github.sha }}.zip"

      # SSM Run Command로 EC2에 배포 명령 전달
      # EC2에서 S3 다운로드 → Docker 빌드 → 컨테이너 교체
      - name: Deploy via SSM Run Command
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "set -e",
              "echo \"[1/5] S3에서 아티팩트 다운로드\"",
              "aws s3 cp s3://${{ secrets.S3_BUCKET_NAME }}/builds/app-${{ github.sha }}.zip /tmp/app.zip",
              "echo \"[2/5] 압축 해제\"",
              "rm -rf /app && mkdir -p /app",
              "unzip -o /tmp/app.zip -d /app/",
              "rm -f /tmp/app.zip",
              "echo \"[3/5] Docker 이미지 빌드\"",
              "docker build -t app:${{ github.sha }} /app/",
              "echo \"[4/5] 기존 컨테이너 교체\"",
              "docker stop app 2>/dev/null || true",
              "docker rm app 2>/dev/null || true",
              "docker run -d --name app --restart unless-stopped -p 80:8080 app:${{ github.sha }}",
              "echo \"[5/5] 오래된 이미지 정리\"",
              "docker image prune -f",
              "echo \"배포 완료: ${{ github.sha }}\""
            ]' \
            --region ${{ env.AWS_REGION }} \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"
          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV

      # 배포 완료될 때까지 최대 5분 대기
      - name: Wait for deployment
        run: |
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region ${{ env.AWS_REGION }}

      # 배포 결과 확인 — 실패 시 에러 로그 출력 후 워크플로우 실패 처리
      - name: Check deployment result
        run: |
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region ${{ env.AWS_REGION }} \
            --query "Status" \
            --output text)

          echo "배포 상태: $STATUS"

          if [ "$STATUS" != "Success" ]; then
            echo "배포 실패! 에러 로그:"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --region ${{ env.AWS_REGION }} \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi

          echo "배포 성공!"